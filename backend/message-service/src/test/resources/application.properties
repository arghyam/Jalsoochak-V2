# Disable infrastructure that requires external services during tests
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=none
eureka.client.enabled=false

# Placeholder Kafka config – not needed for unit/integration tests
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false
spring.kafka.consumer.group-id=test-group

# Glific – auth URL must be present but is overridden or mocked per test
glific.auth-url=http://localhost:9999/mock-glific
glific.username=test-user
glific.password=test-password
glific.api-url=http://localhost:9999/mock-api
glific.template.nudge-id=12345
glific.template.escalation-id=67890

# MinIO – real client instantiates but upload is mocked in tests
minio.endpoint=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin
minio.bucket=test-bucket
minio.base-url=http://localhost:9000

# Escalation report directory – use a temp location in tests
escalation.report.dir=${java.io.tmpdir}/escalation-reports-test/

# app.base-url – suppress the localhost warning; tests don't send real WhatsApp
app.base-url=http://localhost:8085
