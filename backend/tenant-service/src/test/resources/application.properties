# Disable infrastructure that requires external services during tests
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=none
eureka.client.enabled=false

# Placeholder Kafka config – KafkaTemplate is mocked via @MockBean in tests
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false
spring.kafka.consumer.group-id=test-group

# Prevent schedulers from firing while Spring context loads
nudge.cron=0 0 0 1 1 ? 2099
escalation.cron=0 0 0 1 1 ? 2099
