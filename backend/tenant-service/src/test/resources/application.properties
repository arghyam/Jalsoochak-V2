# Disable infrastructure that requires external services during tests
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=none
eureka.client.enabled=false

# Placeholder Kafka config – KafkaTemplate is mocked via @MockBean in tests
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false
spring.kafka.consumer.group-id=test-group

# Fallback schedule defaults (far-future crons are no longer needed;
# TenantSchedulerManager is @MockBean in Spring context tests)
nudge.schedule.hour=8
nudge.schedule.minute=0
escalation.schedule.hour=9
escalation.schedule.minute=0
escalation.level1.threshold.days=3
escalation.level1.officer.user_type=SECTION_OFFICER
escalation.level2.threshold.days=7
escalation.level2.officer.user_type=DISTRICT_OFFICER
