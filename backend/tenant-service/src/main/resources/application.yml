server:
  port: 8082

spring:
  config:
    import: optional:file:./tenant-service/.env[.properties],optional:file:.env[.properties]

  application:
    name: tenant-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 30000
      initialization-fail-timeout: -1

  flyway:
    enabled: true
    baseline-version: 0
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: common_schema
    schemas: common_schema

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: common_schema

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: tenant-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 50
      properties:
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        max.poll.interval.ms: 600000
        fetch.max.wait.ms: 500

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: "*"

# ────────────────────────────────────────────────────────────── # Nudge & Escalation Scheduler Configuration # ──────────────────────────────────────────────────────────────
# Fallback defaults used when a tenant has no row in tenant_config_master_table
nudge:
  schedule:
    hour: 18
    minute: 00
escalation:
  schedule:
    hour: 18
    minute: 00
  level1:
    threshold:
      days: 3 # Days of missed uploads before level-1 officer is notified
    officer:
      user_type: SECTION_OFFICER
  level2:
    threshold:
      days: 7 # Days before level-2 officer is notified
    officer:
      user_type: DISTRICT_OFFICER
logging:
  file:
    name: ${LOG_FILE_PATH:../logger/logs/backend-services.log}
  pattern:
    level: "service=${spring.application.name} %5p"
