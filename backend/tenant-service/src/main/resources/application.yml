server:
  port: 8081

spring:
  config:
    import: optional:file:./tenant-service/.env[.properties],optional:file:.env[.properties]

  application:
    name: tenant-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 30000
      initialization-fail-timeout: -1
      connection-init-sql: SET search_path TO common_schema, public

  flyway:
    enabled: true
    baseline-version: 0
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: common_schema
    schemas: common_schema

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: common_schema

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://jalsoochak.beehyv.com/keycloak/realms/jalsoochak-realm}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: tenant-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 50
      properties:
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
        max.poll.interval.ms: 600000
        fetch.max.wait.ms: 500

keycloak:
  realm: jalsoochak-realm
  auth-server-url: https://jalsoochak.beehyv.com/keycloak
  resource: jalsoochak-client-id

eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: "*"

# ────────────────────────────────────────────────────────────── # Nudge & Escalation Scheduler Configuration # ──────────────────────────────────────────────────────────────
# Fallback defaults used when a tenant has no row in tenant_config_master_table
nudge:
  schedule:
    hour: 18
    minute: 00
escalation:
  schedule:
    hour: 18
    minute: 00
  level1:
    threshold:
      days: 3 # Days of missed uploads before level-1 officer is notified
    officer:
      user_type: SECTION_OFFICER
  level2:
    threshold:
      days: 7 # Days before level-2 officer is notified
    officer:
      user_type: DISTRICT_OFFICER
storage:
  provider: ${STORAGE_PROVIDER:s3}
  endpoint: ${STORAGE_ENDPOINT:}               # blank = real AWS S3; set to MinIO/R2/etc. URL for custom providers
  region: ${STORAGE_REGION:ap-south-1}
  access-key: ${STORAGE_ACCESS_KEY:}           # leave blank to disable storage (no-op fallback activates)
  secret-key: ${STORAGE_SECRET_KEY:}
  bucket: ${STORAGE_BUCKET:tenant-assets}

spring.servlet.multipart:
  max-file-size: 2MB
  max-request-size: 2MB

logging:
  file:
    name: ${LOG_FILE_PATH:../logger/logs/backend-services.log}
  pattern:
    level: "service=${spring.application.name} %5p"

tenant:
  defaults:
    lgd-location-hierarchy:
      - level: 1
        level-name:
          - title: "State"
      - level: 2
        level-name:
          - title: "District"
      - level: 3
        level-name:
          - title: "Block"
      - level: 4
        level-name:
          - title: "Panchayat"
      - level: 5
        level-name:
          - title: "Village"
    dept-location-hierarchy:
      - level: 1
        level-name:
          - title: "State"
      - level: 2
        level-name:
          - title: "Zone"
      - level: 3
        level-name:
          - title: "Circle"
      - level: 4
        level-name:
          - title: "Division"
      - level: 5
        level-name:
          - title: "Sub-division"
    meter-change-reasons:
      - id: "METER_REPLACED"
        name: "Meter Replaced"
        sequence-order: 1
        is-default: true
        editable: true
      - id: "METER_NOT_WORKING"
        name: "Meter Not Working"
        sequence-order: 2
        is-default: true
        editable: true
      - id: "METER_DAMAGED"
        name: "Meter Damaged"
        sequence-order: 3
        is-default: true
        editable: true
