server:
  port: 8287

spring:
  config:
    import: optional:file:./scheme-service/.env[.properties],optional:file:.env[.properties]

  application:
    name: scheme-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://jalsoochak.beehyv.com/keycloak/realms/jalsoochak-realm}

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: scheme-service-group
      auto-offset-reset: earliest

keycloak:
  realm: ${KEYCLOAK_REALM:jalsoochak-realm}
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:https://jalsoochak.beehyv.com/keycloak}
  resource: ${KEYCLOAK_CLIENT_ID:scheme-client}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  file:
    name: ${LOG_FILE_PATH:../logger/logs/backend-services.log}
  pattern:
    level: "service=${spring.application.name} %5p"
