spring.flyway.enabled=false
eureka.client.enabled=false
spring.kafka.admin.fail-fast=false

# Keycloak → WireMock (wiremock.server.port is set by @AutoConfigureWireMock before context init)
keycloak.auth-server-url=http://localhost:${wiremock.server.port}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:${wiremock.server.port}/realms/jalsoochak-realm/protocol/openid-connect/certs

# Static Keycloak client credentials for test
keycloak.resource=test-client
keycloak.credentials.secret=test-secret
keycloak.admin-client-id=admin-client
keycloak.admin-client-secret=admin-secret

# Mail — JavaMailSender requires these even when MailService is mocked
spring.mail.username=test@example.com
spring.mail.password=testpassword

cookie.secure=false
cookie.same-site=Strict

# PII encryption — test-only keys (32-byte base64-encoded)
pii.encryption-key=dGVzdC1lbmNyeXB0aW9uLWtleS10ZXN0aW5nLTEyMzQ=
pii.hmac-key=dGVzdC1obWFjLWtleS1mb3ItdGVzdGluZy1vbmx5MTI=

# Staff managed-password key — test-only (32-byte base64-encoded)
staff.managed-password-key=dGVzdC1zdGFmZi1wYXNzd29yZC1rZXktdGVzdDEyMzQ=

# OTP config
otp.expiry-minutes=5
otp.max-attempts=3
otp.cooldown-seconds=60
otp.otp-length=6
otp.delivery-channel=WHATSAPP
