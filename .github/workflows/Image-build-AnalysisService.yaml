name: Image Build & SonarQube Scan for Analytics Service

on:
  push:
    branches: ["main", "dev"]
    paths:
      - 'backend/analytics-service/**'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'backend/analytics-service/**'
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

jobs:
  Docker-Image-Build:
    name: SonarQube scan & push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK 21  
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github

      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run:  mvn -B package org.sonarsource.scanner.maven:sonar-maven-plugin:3.11.0.3922:sonar -Dsonar.projectKey=jalsoochak-analyticsservice -Dsonar.organization=jalsoochak -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.qualitygate.wait=false
        working-directory: backend/analytics-service
        
      - name: Configure AWS credentials
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker build
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --build-arg WORK_DIR="backend/analytics-service" -t $ECR_REGISTRY/analytics-service:$IMAGE_TAG -f build/maven/Dockerfile .
          docker push $ECR_REGISTRY/analytics-service:$IMAGE_TAG

      - name: Cache Trivy DB
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: actions/cache@v3
        with:
          path: ~/.cache/trivy
          key: ${{ runner.os }}-trivy-db

      - name: Run Trivy vulnerability scanner
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          # Image to scan (use commit SHA for traceability)
          image-ref: ${{ steps.ecr-login.outputs.registry }}/analytics-service:${{ github.sha }}
          # Output format for GitHub Security tab integration
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload Trivy scan results
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
  Deployment:
    needs: Docker-Image-Build
    strategy:
      matrix:
        include:
          - branch: refs/heads/dev
            env: dev
            ref: dev
          - branch: refs/heads/main
            env: main
            ref: staging
    if: github.ref == matrix.branch
    uses: arghyam/JalSoochak-DevOps/.github/workflows/deploy.yaml@${{ matrix.ref }}
    with:
      service_name: analytics-service
      image_tag: ${{ github.sha }}
